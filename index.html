            "@type": "Answer",
            "text": "Amphibian Labs builds AI-powered backends, workflow automations, system integrations, and document intelligence systems for Australian small and medium-sized businesses. The company enhances existing systems instead of replacing them."

          }
        },
        {
          "@type": "Question",
          "name": "Do I need to replace my existing systems?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Amphibian Labs focuses on enhancing current systems through automation, API integration, middleware, document extraction, and AI backends. Replacement is only recommended when it is genuinely the best option."
          }
        },

          "@type": "Question",
          "name": "What technologies does Amphibian Labs use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Amphibian Labs works with Python, FastAPI, Docker, Power Automate, Microsoft 365, SharePoint, Azure, n8n, Make, REST APIs, OCR, NLP, PostgreSQL, React, TypeScript, and Tesseract."
          }
        },
        {
          "@type": "Question",
          "name": "How much does a discovery session cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A discovery session costs $300 for 2 hours. It includes workflow diagnosis, current-state mapping, technical recommendations, and 2-3 practical next steps delivered in writing."
          }
        },
        {
          "@type": "Question",
          "name": "Does Amphibian Labs build custom AI systems?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Amphibian Labs builds focused AI backends for document extraction, OCR, NLP, classification, validation, structured data output, and integration with existing business systems."
          }
        },
        {
          "@type": "Question",
          "name": "Will I own the software?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Where custom software is built, Amphibian Labs provides source code, documentation, deployment notes, and handover. The goal is clear ownership and no vendor lock-in."
          }
        }
      ]
